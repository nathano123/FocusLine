<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: warm near-black, slightly rounded -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161614"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6A4A"/>
      <stop offset="100%" stop-color="#E04A2E"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- App tile -->
  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <!-- Faint track behind the line, hints at how the line is empty when idle -->
  <rect x="160" y="486" width="704" height="52" rx="26" fill="#FFFFFF" fill-opacity="0.06"/>

  <!-- The line itself — the brand mark. ~75% filled to suggest a session in progress. -->
  <g filter="url(#glow)">
    <rect x="160" y="486" width="528" height="52" rx="26" fill="url(#line)"/>
  </g>

  <!-- Mini progress endpoint dot, glow accent -->
  <circle cx="688" cy="512" r="36" fill="#FF6A4A" fill-opacity="0.18"/>
</svg>
